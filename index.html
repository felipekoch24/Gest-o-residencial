<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTAS DO PAI</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; color: #000; }
        .abas { display: flex; gap: 8px; margin-bottom: 10px; }
        .aba-btn { flex: 1; padding: 20px; border: none; border-radius: 10px; font-weight: 900; font-size: 18px; cursor: pointer; background: #ccc; text-transform: uppercase; }
        .aba-btn.active { background: #004488; color: white; }

        .secao { display: none; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .secao.active { display: block; }

        label { display: block; font-weight: bold; font-size: 13px; margin-top: 12px; color: #444; text-transform: uppercase; }
        input { width: 100%; padding: 15px; font-size: 22px; font-weight: bold; text-align: center; border: 2px solid #bbb; border-radius: 8px; box-sizing: border-box; margin-bottom: 5px; }
        
        .btn-gerar { width: 100%; padding: 22px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 20px; font-weight: 900; cursor: pointer; margin-top: 15px; }

        /* Estilo do Recibo para o Pai */
        #recibo { 
            margin-top: 20px; padding: 20px; background: #fff; border: 4px solid #000; 
            border-radius: 10px; display: none; text-align: left; 
            font-family: Arial, sans-serif; font-size: 18px; line-height: 1.5;
        }
        .data-header { color: #cc0000; font-weight: 900; border-bottom: 3px solid #000; margin-bottom: 15px; text-align: center; display: block; font-size: 22px; }
        .bloco { border-bottom: 2px solid #333; padding: 15px 0; }
        .destaque { font-size: 24px; font-weight: 900; background: #eee; padding: 2px 5px; }
        footer { text-align: center; margin-top: 20px; font-weight: bold; color: #aaa; font-size: 10px; }
    </style>
</head>
<body>

<div class="abas">
    <button class="aba-btn active" onclick="tab(this, 'agua')">💧 ÁGUA</button>
    <button class="aba-btn" onclick="tab(this, 'luz')">⚡ LUZ</button>
</div>

<div id="agua" class="secao active">
    <label>VALOR TOTAL DA CONTA (R$)</label>
    <input type="text" id="a-total" placeholder="R$ 0,00" oninput="money(this)">
    <label>CONSUMO NANDA FILHA (m³)</label>
    <input type="number" id="a-nanda-c" step="0.1">
    <label>CONSUMO LEIA (m³)</label>
    <input type="number" id="a-leia-c" step="0.1">
    <label>CONSUMO TOTAL DA CONTA (m³)</label>
    <input type="number" id="a-total-m3" step="0.1">
    <label>TAXA FIXA ÁGUA (R$)</label>
    <input type="text" id="a-taxa" value="R$ 82,06" oninput="money(this)">
    <button class="btn-gerar" onclick="calcAgua()">GERAR RECIBO ÁGUA</button>
</div>

<div id="luz" class="secao">
    <label>VALOR TOTAL DA CONTA (R$)</label>
    <input type="text" id="l-total" placeholder="R$ 0,00" oninput="money(this)">
    <label>CONSUMO NANDA FILHA (kWh)</label>
    <input type="number" id="l-nanda-c">
    <label>CONSUMO TOTAL DA CONTA (kWh)</label>
    <input type="number" id="l-total-kw">
    <label>TAXA DE LUZ (R$)</label>
    <input type="text" id="l-taxa" oninput="money(this)">
    <button class="btn-gerar" onclick="calcLuz()">GERAR RECIBO LUZ</button>
</div>

<div id="recibo"></div>
<footer>SISTEMA DE GESTÃO - FELIPE</footer>

<script>
    function tab(btn, id) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        document.getElementById('recibo').style.display = 'none';
    }

    function money(i) {
        let v = i.value.replace(/\D/g, "");
        v = (v / 100).toFixed(2).replace(".", ",");
        v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
        i.value = "R$ " + v;
    }

    function toNum(v) { return parseFloat(v.replace(/[^\d,]/g, '').replace(',', '.')) || 0; }
    function toReal(n) { return n.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'}); }

    function getD() {
        const d = new Date();
        const m = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
        return `${d.getDate()} DE ${m[d.getMonth()]}`;
    }

    function htmlBloco(nome, totalC, taxa, consumoVal, m3kw, totalInd, unidade) {
        return `
            <div class="bloco">
                <b style="font-size: 22px;">${nome}:</b><br>
                TOTAL CONTA: <b>${toReal(totalC)}</b><br>
                TAXA: <b>${toReal(taxa)}</b><br>
                CONSUMO: ${m3kw} ${unidade} (<b>${toReal(consumoVal)}</b>)<br>
                TOTAL A PAGAR: <span class="destaque">${toReal(totalInd)}</span>
            </div>`;
    }

    function calcAgua() {
        const totalRs = toNum(document.getElementById('a-total').value);
        const taxaT = toNum(document.getElementById('a-taxa').value);
        const m3T = parseFloat(document.getElementById('a-total-m3').value) || 1;
        const nandaM3 = parseFloat(document.getElementById('a-nanda-c').value) || 0;
        const leiaM3 = parseFloat(document.getElementById('a-leia-c').value) || 0;
        const carlaM3 = m3T - nandaM3 - leiaM3;
        const preco = (totalRs - taxaT) / m3T;
        const taxaP = taxaT / 3;

        const r = document.getElementById('recibo');
        r.innerHTML = `<span class="data-header">DATA: ${getD()}</span>
            <center><b style="font-size: 20px;">DEMONSTRATIVO DE ÁGUA</b></center>
            ${htmlBloco('NANDA FILHA', totalRs, taxaP, nandaM3 * preco, nandaM3, (nandaM3 * preco) + taxaP, 'm³')}
            ${htmlBloco('LEIA', totalRs, taxaP, leiaM3 * preco, leiaM3, (leiaM3 * preco) + taxaP, 'm³')}
            ${htmlBloco('CARLA', totalRs, taxaP, carlaM3 * preco, carlaM3.toFixed(1), (carlaM3 * preco) + taxaP, 'm³')}`;
        r.style.display = 'block';
    }

    function calcLuz() {
        const totalRs = toNum(document.getElementById('l-total').value);
        const taxaT = toNum(document.getElementById('l-taxa').value);
        const kwT = parseFloat(document.getElementById('l-total-kw').value) || 1;
        const nandaKw = parseFloat(document.getElementById('l-nanda-c').value) || 0;
        const carlaKw = kwT - nandaKw;
        const preco = (totalRs - taxaT) / kwT;
        const taxaP = taxaT / 2;

        const r = document.getElementById('recibo');
        r.innerHTML = `<span class="data-header">DATA: ${getD()}</span>
            <center><b style="font-size: 20px;">DEMONSTRATIVO DE LUZ</b></center>
            ${htmlBloco('NANDA FILHA', totalRs, taxaP, nandaKw * preco, nandaKw, (nandaKw * preco) + taxaP, 'kWh')}
            ${htmlBloco('CARLA', totalRs, taxaP, carlaKw * preco, carlaKw, (carlaKw * preco) + taxaP, 'kWh')}`;
        r.style.display = 'block';
    }
</script>

</body>
</html>
