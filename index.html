<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Contas Casa</title>
    <style>
        :root { --azul: #004488; --cinza: #f4f4f9; }
        body { font-family: sans-serif; margin: 0; background: var(--cinza); user-select: none; }
        .navbar { display: flex; background: var(--azul); position: sticky; top: 0; z-index: 100; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; opacity: 0.6; }
        .nav-btn.active { opacity: 1; border-bottom: 4px solid white; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--azul); text-align: center; margin-top: 0; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px; font-size: 12px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }
        button.calc-btn { width: 100%; padding: 15px; background: var(--azul); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="navbar">
    <button class="nav-btn active" onclick="switchTab('agua')">ÁGUA</button>
    <button class="nav-btn" onclick="switchTab('luz')">LUZ</button>
</div>

<div id="tab-agua" class="container">
    <div class="card">
        <h2>Controle de Água</h2>
        <label>VALOR TOTAL DA CONTA (R$)</label>
        <input type="number" id="v-total" step="0.01" placeholder="0,00">
        <label>TAXA FIXA (R$)</label>
        <input type="number" id="t-fixa" step="0.01" value="82.06">
        <label>CONSUMO TOTAL (m³)</label>
        <input type="number" id="c-total" placeholder="Ex: 60">
    </div>
    <div class="card">
        <label>CASA 2 (Leitura Atual)</label>
        <input type="number" id="c2-leitura" placeholder="Atual">
        <label>CASA 3 (Leitura Atual)</label>
        <input type="number" id="c3-leitura" placeholder="Atual">
    </div>
    <button class="calc-btn" onclick="calcularAgua()">CALCULAR ÁGUA</button>
</div>

<div id="tab-luz" class="container hidden">
    <div class="card">
        <h2>Controle de Luz</h2>
        <p style="text-align:center; color:#666;">Em desenvolvimento...</p>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.getElementById('tab-agua').classList.toggle('hidden', tab !== 'agua');
        document.getElementById('tab-luz').classList.toggle('hidden', tab !== 'luz');
        document.querySelectorAll('.nav-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', (tab === 'agua' && idx === 0) || (tab === 'luz' && idx === 1));
        });
    }

    function calcularAgua() {
        const vTotal = parseFloat(document.getElementById('v-total').value);
        if(!vTotal) { alert('Coloque o valor da conta!'); return; }
        alert('Cálculo acionado! Valor: R$ ' + vTotal);
        // Aqui colocaremos a lógica completa assim que o botão voltar a funcionar
    }
</script>

</body>
</html>
